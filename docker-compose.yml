version: "3.9"

services:
  # ── Backend API ─────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./aqi_platform.db
      - DEBUG=true
      - SECRET_KEY=isro-aqi-hackathon-2026
    volumes:
      - ./backend:/app
      - ./ai_models:/app/ai_models
    restart: unless-stopped

  # ── Frontend Dev Server ─────────────────────────────────────────
  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000
    restart: unless-stopped
